# Sample config for `vastde-orch tenant create | destroy`
#
# Usage:
#   cp sample/tenant-setup.example.yaml my-tenant.yaml
#   # edit the REQUIRED fields below for your tenant
#   vastde-orch tenant create  -c my-tenant.yaml --plan        # dry-run
#   vastde-orch tenant create  -c my-tenant.yaml               # apply
#   vastde-orch tenant destroy -c my-tenant.yaml --plan        # dry-run teardown
#   vastde-orch tenant destroy -c my-tenant.yaml --yes         # apply teardown (CI-safe)
#
# Env vars referenced via ${VAR} must be set in your shell or .env first:
#   set -a; source .env; set +a
#   VMS_USER                — cluster-admin username
#   VMS_PASSWORD            — cluster-admin password
#   TENANT_ADMIN_PASSWORD   — password to set on the new tenant-admin manager
#
# What this creates (10 idempotent steps — re-running is safe):
#   1. Tenant
#   2. Group                                  scoped to tenant's local provider
#   3. Bucket-owner user                      scoped to tenant's local provider
#   4. Tenant-admin role
#   5. Tenant-admin manager                   password from cfg or env
#   6. VIP pool                               optional — auto-picks IP range if omitted
#   7. View policies                          NFS + S3 (defaulted from <tenant>-{nfs,s3}-policy)
#   8. Assign DE group to tenant              PATCHes application_users_group_name (Web UI checkbox equivalent)
#   9. DataEngine identity policy + bind      KB-doc-aligned policy, bound to DE group via group-side PATCH
#  10. (Opt-in) bind to AllowAllTabular       broader S3 + Kafka access; off by default

# ─── REQUIRED ──────────────────────────────────────────────────────────────

vms:
  address:  var203.selab.vastdata.com
  user:     ${VMS_USER}
  password: ${VMS_PASSWORD}

tenant:
  name: my-tenant                              # new tenant to create

identity:
  group:
    name: my-de-users                          # group for DataEngine app users
    gid:  75800                                # cluster-unique GID
  bucket_owner:
    name: my-de-owner                          # bucket-owner user (NEW)
    uid:  75800                                # cluster-unique UID

vip_pool:                                      # required if you plan to run `tenant enable` afterwards
  name:         my-vip-pool
  cidr:         172.200.203.0/24               # subnet to allocate IPs from (must be reachable from VAST)
  default_size: 3                              # auto-picks the smallest free 3-IP gap in the subnet
  # domain_name: my-vip-pool                   # short DNS name → FQDN <name>.<cluster-dns>; defaults to `name` when omitted
                                               # set to "" to opt out, or override to e.g. "amer" / "<tenant>-de"

# ─── OPTIONAL ──────────────────────────────────────────────────────────────
# All blocks below are OPTIONAL — defaults work for most cases. Uncomment
# only the fields you need to override.

# tenant:
#   domain: my                                 # optional; used for tenant-scoped login URL

# identity:
#   group:
#     local_provider_id: 7                     # default = tenant's auto-created local provider (auto-discovered)
#   bucket_owner:
#     allow_create_bucket: true                # default true
#     allow_delete_bucket: true                # default true
#     local_provider_id:   7                   # default = tenant's auto-created local provider
#     # leading_group is auto-set to identity.group.name

# tenant_admin:                                # step 5 — defaults below kick in if absent
#   name:       my-admin                       # default = <tenant>-admin
#   password:   ${TENANT_ADMIN_PASSWORD}       # default = $TENANT_ADMIN_PASSWORD env var
#   role_name:  my-admin-role                  # default = <tenant>-admin-role
#   first_name: my                             # cosmetic
#   last_name:  admin                          # cosmetic

# vip_pool:                                    # step 6 overrides
#   role: PROTOCOLS                            # default PROTOCOLS; other: NVME_HOST, FAULT_DOMAIN
#   ip_range:                                  # auto-picked when omitted; if given AND overlaps, falls back to auto-pick
#     start: 172.200.203.180
#     end:   172.200.203.182

# view_policies:                               # step 7 overrides (block is itself optional)
#   nfs:
#     name:   my-nfs-policy                    # default = <tenant>-nfs-policy
#     flavor: NFS                              # NFS | SMB | S3_NATIVE | MIXED_LAST_WINS (default NFS)
#   s3:
#     name:   my-s3-policy                     # default = <tenant>-s3-policy
#     flavor: S3_NATIVE                        # required for views containing DATABASE protocol

# dataengine_policy:                           # steps 9 + 10 overrides
#   name:                     my-de-write      # default = <tenant>-de-write (the `data-engine-<tenant>` name is reserved by VMS)
#   group:                    my-de-users      # default = identity.group.name
#   attach_allow_all_tabular: false            # opt-in for step 10; default false
#   allow_all_tabular_name:   AllowAllTabular  # default; only matters if opt-in
