# vastde.yaml — minimal tenant-scoped DataEngine deployment template
#
# Workflow: Fill in the REQUIRED fields below; uncomment any OPTIONAL field
# whose default doesn't suit you. Everything else is auto-derived.
#
# Secrets (passwords, API tokens) NEVER go in this file — use *_env to point
# at an environment variable instead.
#
# Prerequisites (cluster admin, one-time, outside this tool):
#   - The tenant exists
#   - A PROTOCOLS VIP pool is bound to this tenant
#   - A tenant-admin manager + role exist on this tenant
#   - The K8s cluster is reachable and has Zarf + Knative + KEDA + VAST CSI

# ════════════════ REQUIRED ════════════════

vms:
  address:     var203.selab.vastdata.com         # REQUIRED — VMS hostname or IP
  tenant_name: my-tenant                         # REQUIRED — target tenant (must exist)
  auth:
    user_env:     TENANT_ADMIN_USER              # REQUIRED — env var holding tenant-admin user
    password_env: TENANT_ADMIN_PASSWORD          # REQUIRED — env var holding tenant-admin pass

vip_pool_name: my-de-vips                        # REQUIRED — name of pre-existing PROTOCOLS pool

k8s:
  kube_api_url: https://10.143.2.242:6443        # REQUIRED — K8s API server URL
  mtls:
    ca_cert_file:     ./certs/ca.pem             # REQUIRED — paths to PEM files; tool base64-encodes
    client_cert_file: ./certs/client.pem         # REQUIRED
    client_key_file:  ./certs/client.key         # REQUIRED

registry:
  url: docker.io                                 # REQUIRED — registry URL (no scheme)

